name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  macos:
    name: macOS Rust workspace
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Rust
        run: rustup toolchain install 1.96.1 --profile minimal --component clippy --component rustfmt

      - name: Format
        run: cargo fmt --all -- --check

      - name: Test
        run: cargo test --workspace --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
