name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]
  push:
    branches:
      - main

jobs:
  pr-review-packet:
    name: PR review packet
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check optimization packet
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python3 scripts/check-pr-review-packet.py

  macos:
    name: macOS Rust workspace
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Rust
        run: rustup toolchain install 1.93.1 --profile minimal --component clippy --component rustfmt

      - name: Use pinned Rust
        run: rustup default 1.93.1

      - name: Toolchain provenance
        run: |
          rustc -vV
          cargo -vV

      - name: Format
        run: cargo fmt --all -- --check

      - name: Test
        run: cargo test --workspace --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
