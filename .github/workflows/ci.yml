name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  macos:
    name: macOS Rust workspace
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --component clippy --component rustfmt

      - name: Use stable Rust
        run: rustup default stable

      - name: Format
        run: cargo fmt --all -- --check

      - name: Test
        run: cargo test --workspace --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Runtime-first guardrail
        run: python3 scripts/run-beater-osd-runtime-smoke.py --json

      - name: Migration frontier readiness (runtime phase)
        run: >
          python3 scripts/check-bare-metal-readiness.py
          --check-host
          --require-control-plane-lane
          --require-workload-class policy-admission
          --require-workload-route policy-admission=portable-control-plane
          --require-migration-phase runtime

      - name: Bare-metal e2e matrix
        run: python3 scripts/run-bare-metal-e2e-matrix.py
