name: Governance

# Repo-process checks for multi-agent collaboration. Complementary to the Rust
# CI job in ci.yml: this runs on Linux (final.md §1 names Linux the primary
# substrate) and only guards process invariants + the governance tool itself.
# It fails a PR only on ERROR-level findings (e.g. final.md gutted), never on
# missing-coordination-doc warnings, so it will not spuriously block in-flight
# PRs from other agents.

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  governance:
    name: PR governance (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Governance tool unit tests
        run: python3 -m unittest discover -s tools -p 'test_*.py' -v

      - name: Repo governance invariants
        run: python3 tools/pr_governance_check.py --repo .
