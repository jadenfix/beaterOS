name: contracts

on:
  pull_request:
    paths:
      - "contracts/**"
      - "tools/**"
      - "tests/**"
      - "final.md"
      - ".github/workflows/contracts.yml"
  push:
    branches: [main]

jobs:
  # Prove the harness works with zero third-party dependencies (the built-in
  # fallback validator), so any reviewer can reproduce CI locally.
  dependency-free:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: final.md integrity guard
        run: python3 tools/final_integrity.py
      - name: validate contract examples (built-in validator)
        run: python3 tools/contracts_validate.py
      - name: conformance + negative tests
        run: python3 -m unittest discover -s tests -v

  # Prove the authoritative Draft 2020-12 path (jsonschema) agrees.
  authoritative:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install jsonschema
        run: python3 -m pip install --quiet jsonschema referencing
      - name: validate contract examples (jsonschema)
        run: python3 tools/contracts_validate.py
      - name: conformance + negative tests
        run: python3 -m unittest discover -s tests -v
